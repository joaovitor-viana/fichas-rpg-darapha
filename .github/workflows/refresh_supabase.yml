name: Refresh Supabase Schema

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Supabase CLI
        run: |
          npm install -g supabase

      - name: Execute SQL
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db execute --project-ref krnydvgbctzsbeetznks "ALTER TABLE public.characters ADD COLUMN IF NOT EXISTS caracteristicas text; NOTIFY pgrst, 'reload schema';" --access-token "$SUPABASE_ACCESS_TOKEN"
